{% extends "base.html" %}

{% block content %}
<h1>Assets</h1>

<form method="post">
    <input name="name" placeholder="Asset name">
    <input name="type" placeholder="Type (stock, cash, etc)">
    <input name="value" placeholder="Value" type="number" step="0.01">
    <button type="submit">Add Asset</button>
</form>

<h2>Your Assets</h2>
<ul>
{% for asset in assets %}
    <li>
        {{ asset.name }} ({{ asset.type }}) - ${{ asset.value }}
        <form method="post" action="/assets/delete/{{ asset.id }}" style="display:inline;">
            <button type="submit">Delete</button>
        </form>
    </li>
{% endfor %}
</ul>


{% endblock %}
