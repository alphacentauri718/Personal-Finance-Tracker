{% extends "base.html" %}

{% block content %}
<h1>Assets</h1>

<form method="post" action="/assets" class="bg-white p-6 rounded-2xl shadow mt-6">

    <input name="name" placeholder="Description"
        class="w-full mb-3 p-2 border rounded-lg" />

    <input name="type" placeholder="Category"
        class="w-full mb-3 p-2 border rounded-lg" />

    <input name="value" type="number" step="0.01"
        class="w-full mb-3 p-2 border rounded-lg" />

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg">
        Add Asset
    </button>

</form>

<table class="w-full bg-white rounded-2xl shadow mt-6 overflow-hidden">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-3 text-left">Description</th>
            <th class="p-3 text-left">Category</th>
            <th class="p-3 text-left">Amount</th>
            <th class="p-3 text-right w-24">Action</th>
        </tr>
    </thead>

    <tbody>
        {% for asset in assets %}
        <tr class="border-t">
            <td class="p-3">{{ asset.name }}</td>
            <td class="p-3">{{ asset.type }}</td>
            <td class="p-3">${{ asset.value }}</td>
            <td class="p-3 text-right">
                <form method="post" action="/assets/delete/{{ asset.id }}">
                    <button 
                        type="submit"
                        onclick="return confirm('Are you sure?')"
                        class="text-red-500 hover:text-red-700 text-sm font-medium">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>


{% endblock %}
