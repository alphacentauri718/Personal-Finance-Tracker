<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white">

<div class="min-h-screen flex flex-col items-center justify-center text-center px-6">

    <h1 class="text-5xl font-extrabold mb-4 tracking-tight">
        Finance Tracker
    </h1>

    <p class="text-gray-400 text-lg max-w-xl mb-10">
        Track your assets, expenses, and net worth with a clean, powerful dashboard.
    </p>

    <div class="flex gap-6">

        <!-- Primary button -->
        <a href="/signup"
           class="bg-blue-500 hover:bg-blue-600 active:scale-95 
                  transition transform 
                  px-8 py-3 rounded-xl font-semibold text-lg shadow-lg">
            Get Started
        </a>

        <!-- Secondary button -->
        <a href="/login"
           class="border border-gray-600 hover:border-gray-400 
                  hover:bg-gray-800 active:scale-95
                  transition transform 
                  px-8 py-3 rounded-xl font-semibold text-lg">
            Login
        </a>

    </div>

</div>

</body>
</html>
