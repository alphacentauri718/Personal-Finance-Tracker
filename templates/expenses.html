{% extends "base.html" %}

{% block content %}
<h2>Expenses</h2>

<!-- Form to add new expense -->
<form method="post" class="bg-white p-6 rounded-2xl shadow mt-6" action = "/expenses">

    <input name="description" placeholder="Description"
        class="w-full mb-3 p-2 border rounded-lg" />

    <input name="category" placeholder="Category"
        class="w-full mb-3 p-2 border rounded-lg" />

    <input name="amount" type="number" step="0.01"
        class="w-full mb-3 p-2 border rounded-lg" />

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg">
        Add Expense
    </button>

</form>


<!-- List all expenses -->
<table class="w-full bg-white rounded-2xl shadow mt-6 overflow-hidden">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-3 text-left">Description</th>
            <th class="p-3 text-left">Category</th>
            <th class="p-3 text-left">Amount</th>
            <th class="p-3 text-right w-24">Action</th>
        </tr>
    </thead>
    <tbody>
        {% for expense in expenses %}
        <tr class="border-t hover:bg-gray-50">
            <td class="p-3">{{ expense.description }}</td>
            <td class="p-3">{{ expense.category }}</td>
            <td class="p-3">${{ expense.amount }}</td>
            <td class="p-3 text-right">
                <form method="post" action="/expenses/delete/{{ expense.id }}">
                    <button 
                        type="submit"
                        onclick="return confirm('Are you sure?')"
                        class="text-red-500 hover:text-red-700 text-sm font-medium">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
