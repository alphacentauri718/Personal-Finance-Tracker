{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-3 gap-6">

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3 class="text-gray-500">Total Assets</h3>
        <p class="text-2xl font-bold">${{ total_assets }}</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3 class="text-gray-500">Total Expenses</h3>
        <p class="text-2xl font-bold">${{ total_expenses }}</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3 class="text-gray-500">Net Worth</h3>
        <p class="text-2xl font-bold text-green-600">
            ${{ net_worth }}
        </p>
    </div>

</div>

<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>

<button id="link-button">Connect Bank</button>

<script>
document.getElementById('link-button').onclick = async () => {

    const res = await fetch('/plaid/link-token', { method: 'POST' });
    const data = await res.json();

    const handler = Plaid.create({
        token: data.link_token,
        onSuccess: async function(public_token) {
            await fetch('/plaid/exchange-token', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ public_token })
            });
        }
    });

    handler.open();
};
</script>
{% endblock %}
